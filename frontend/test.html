<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Test - DAES</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Layout shell ──────────────────────────────────────── */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; background: #06090f; }

    /* ── Sticky test topbar ────────────────────────────────── */
    .test-topbar {
      flex-shrink: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #0f766e 100%);
      box-shadow: 0 4px 28px rgba(0,0,0,0.40);
      position: relative;
      z-index: 50;
    }
    .timer-pill {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 0.9rem; padding: 0.55rem 1rem; flex-shrink: 0;
    }
    #submitBtn { width: auto !important; }

    /* ── Section tab bar ──────────────────────────────────── */
    .test-section-bar {
      display: flex; flex-shrink: 0;
      background: #06090f;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.1rem;
      padding: 0.6rem 0.5rem;
      border: none; border-bottom: 3px solid transparent;
      background: transparent;
      color: rgba(255,255,255,0.38);
      font-size: 0.65rem; font-weight: 900;
      letter-spacing: 0.09em; text-transform: uppercase;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn + .tab-btn { border-left: 1px solid rgba(255,255,255,0.06); }
    .tab-btn.tab-active { color: #f97316; border-bottom-color: #f97316; }
    .tab-score {
      font-size: 0.8rem; font-weight: 900; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.22);
    }
    .tab-btn.tab-active .tab-score { color: rgba(255,255,255,0.65); }

    /* ── Main flex body (sidebar + question panel) ────────── */
    .test-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    .test-sidebar {
      width: 185px; flex-shrink: 0;
      background: #06090f;
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto; padding: 0.6rem 0.6rem 1.5rem;
    }
    .test-sidebar::-webkit-scrollbar { width: 3px; }
    .test-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
    .sb-label {
      font-size: 0.6rem; font-weight: 900;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      padding: 0.6rem 0.2rem 0.3rem;
    }
    .sb-label:not(:first-child) { margin-top: 0.5rem; }
    .sb-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.25rem; }
    .sb-q {
      aspect-ratio: 1; border-radius: 0.4rem;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      font-size: 0.68rem; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.11s, color 0.11s, border-color 0.11s;
    }
    .sb-q:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sb-q.sq-answered {
      background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.45);
      color: #93c5fd;
    }
    .sb-q.sq-current {
      background: #f97316; border-color: #f97316; color: #fff;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.22);
    }

    /* ── Question panel ─────────────────────────────────── */
    .test-q-panel { flex: 1; overflow-y: auto; background: #0f172a; }
    .test-q-panel::-webkit-scrollbar { width: 5px; }
    .test-q-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }
    .q-panel-inner { max-width: 840px; margin: 0 auto; padding: 1.75rem 2rem 3rem; }

    /* Section badge */
    .q-section-badge {
      display: inline-flex; align-items: center; gap: 0.45rem;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 999px; padding: 0.28rem 0.8rem;
      font-size: 0.62rem; font-weight: 900;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.04);
      margin-bottom: 0.55rem;
    }
    .q-badge-dot { width: 0.4rem; height: 0.4rem; border-radius: 999px; background: #f97316; flex-shrink: 0; }

    /* Question meta line */
    .q-meta {
      font-size: 0.74rem; font-weight: 700;
      color: rgba(255,255,255,0.28);
      margin-bottom: 1.15rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .q-meta .sep { color: rgba(255,255,255,0.12); }

    /* Question text card */
    .q-text-card {
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem; padding: 1.4rem 1.65rem;
      color: #f1f5f9; font-size: 1rem; font-weight: 700;
      line-height: 1.75; margin-bottom: 1.25rem;
    }

    /* Option tiles */
    .q-options { display: flex; flex-direction: column; gap: 0.6rem; }
    .q-opt {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem 1.1rem;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 0.875rem;
      cursor: pointer; background: rgba(255,255,255,0.025);
      transition: border-color 0.14s, background 0.14s;
      color: rgba(255,255,255,0.72); font-weight: 700; font-size: 0.92rem;
      -webkit-user-select: none; user-select: none;
    }
    .q-opt:hover { border-color: rgba(37,99,235,0.45); background: rgba(37,99,235,0.07); }
    .q-opt.q-selected { border-color: #2563eb; background: rgba(37,99,235,0.14); color: #fff; }
    .q-opt-badge {
      width: 1.85rem; height: 1.85rem; flex-shrink: 0;
      border-radius: 0.4rem;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 900; color: rgba(255,255,255,0.45);
      transition: background 0.14s, color 0.14s, border-color 0.14s;
    }
    .q-opt.q-selected .q-opt-badge { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* Prev / Next navigation */
    .q-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 1.5rem; padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .q-nav-btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.55rem 1.15rem; border-radius: 0.7rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6); font-weight: 800; font-size: 0.78rem;
      cursor: pointer; transition: background 0.12s, color 0.12s;
    }
    .q-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: #fff; }
    .q-nav-btn:disabled { opacity: 0.22; cursor: not-allowed; }
    .q-nav-btn.q-next {
      background: rgba(249,115,22,0.11); border-color: rgba(249,115,22,0.3); color: #fb923c;
    }
    .q-nav-btn.q-next:hover:not(:disabled) { background: rgba(249,115,22,0.22); color: #fff; }

    /* Disable all text selection inside the form */
    #testForm { -webkit-user-select: none; user-select: none; }

    /* Fullscreen exit shield */
    #screenshotShield {
      display: flex; position: fixed; inset: 0; background: #0f172a;
      z-index: 999999; flex-direction: column; align-items: center;
      justify-content: center; gap: 1rem;
    }
    #screenshotShield.hidden { display: none; }
  </style>
</head>

<body>

  <!-- Fullscreen entry prompt — shown before test starts -->
  <div id="fullscreenPrompt"
       style="display:flex;position:fixed;inset:0;z-index:1000000;flex-direction:column;
              align-items:center;justify-content:center;gap:1.5rem;padding:1.5rem;
              background:linear-gradient(150deg,#0f172a 0%,#1e3a8a 55%,#0f766e 100%)">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
    <p style="color:#f1f5f9;font-size:1.15rem;font-weight:800;text-align:center;max-width:22rem;line-height:1.5;">
      Fullscreen mode is required to take the test.
    </p>
    <p style="color:#94a3b8;font-size:0.8rem;font-weight:600;text-align:center;max-width:20rem;line-height:1.6;">
      Your screen will be blocked if you exit fullscreen at any point during the test.
    </p>
    <button id="enterFsBtn" class="btn" style="padding:0.85rem 2rem;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;">
      Enter Fullscreen &amp; Start Test
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>
  </div>

  <!-- Fullscreen exit shield — shown if the participant leaves fullscreen during the test -->
  <div id="screenshotShield" class="hidden" aria-hidden="true">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#f87171"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
    <p style="color:#f1f5f9;font-size:1rem;font-weight:700;text-align:center;max-width:22rem;line-height:1.5;">
      Please re-enter fullscreen to continue the test.
    </p>
    <button id="reenterFsBtn"
            style="margin-top:0.5rem;padding:0.7rem 1.5rem;background:#2dd4bf;
                   color:#0f172a;font-weight:800;border-radius:0.75rem;border:none;cursor:pointer;font-size:0.9rem;">
      Re-enter Fullscreen
    </button>
  </div>

  <!-- ── Sticky test topbar (kept identical to previous design) ── -->
  <header class="test-topbar">
    <div class="max-w-none px-5 sm:px-7 py-4">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">

        <!-- Left: logo + title + answered count -->
        <div class="flex items-center gap-3">
          <img src="assets/logo-icon.png" alt="DAES logo" class="logo-icon flex-shrink-0">
          <div>
            <h1 class="text-xl sm:text-2xl font-black text-white leading-tight">Aptitude Test</h1>
            <p class="text-white/50 text-xs font-semibold mt-0.5">
              45 questions &middot; Sections A, B &amp; C &middot;
              <span id="answeredCount" class="text-teal-300 font-black">0/0</span> answered
            </p>
          </div>
        </div>

        <!-- Right: timer + submit -->
        <div class="flex items-center gap-3">
          <div class="timer-pill">
            <svg class="w-3.5 h-3.5 text-red-300 flex-shrink-0" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span class="text-white/55 text-[0.65rem] font-black uppercase tracking-wider hidden sm:inline">
              Time Left
            </span>
            <span id="timer" class="text-white font-black text-base tracking-wide tabular-nums">60:00</span>
          </div>
          <button id="submitBtn" disabled
                  class="btn flex items-center gap-2 py-2.5 px-5 text-sm whitespace-nowrap
                         opacity-40 cursor-not-allowed">
            Submit Test
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Full-width progress bar -->
    <div class="progress-track" style="border-radius:0;height:4px;">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </header>

  <!-- ── Section tab bar ──────────────────────────────────────── -->
  <div id="testSectionBar" class="test-section-bar">
    <!-- Filled by buildSidebarAndTabs() in test.js -->
  </div>

  <!-- ── Main layout: sidebar + question panel ────────────────── -->
  <div class="test-body">

    <!-- Left sidebar: question number nav -->
    <aside id="testSidebar" class="test-sidebar">
      <!-- Filled by buildSidebarAndTabs() in test.js -->
    </aside>

    <!-- Right: single-question display -->
    <div class="test-q-panel">
      <div class="q-panel-inner">
        <div id="testForm"></div>
        <p id="message" class="mt-4"></p>
      </div>
    </div>

  </div>

  <script src="js/common.js"></script>
  <script src="js/test.js"></script>

  <script>
    (function () {
      const shield     = document.getElementById('screenshotShield');
      const reenterBtn = document.getElementById('reenterFsBtn');
      const fsPrompt   = document.getElementById('fullscreenPrompt');
      const enterFsBtn = document.getElementById('enterFsBtn');
      let testStarted  = false;

      function showShield() { shield.classList.remove('hidden'); }
      function hideShield() { shield.classList.add('hidden'); }

      enterFsBtn.addEventListener('click', async () => {
        try {
          await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
        } catch (_) {}
        fsPrompt.remove();
        testStarted = true;
        hideShield();
        initTest();
      });

      reenterBtn.addEventListener('click', async () => {
        try { await document.documentElement.requestFullscreen({ navigationUI: 'hide' }); } catch (_) {}
      });

      document.addEventListener('fullscreenchange', () => {
        if (!testStarted) return;
        document.fullscreenElement ? hideShield() : showShield();
      });
    })();
  </script>
</body>
</html>
